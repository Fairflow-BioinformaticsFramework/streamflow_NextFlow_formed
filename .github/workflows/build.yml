name: Build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push on main
        if: github.event_name == 'push'
        run: make build

      - name: Build and push release tags
        if: github.event_name == 'release'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg GIT_REVISION=${{ github.event.release.tag_name }} \
            -t ghcr.io/fairflow-bioinformaticsframework/streamflow_nextflow_formed:${{ github.event.release.tag_name }} \
            -t ghcr.io/fairflow-bioinformaticsframework/streamflow_nextflow_formed:latest \
            --push \
            .
